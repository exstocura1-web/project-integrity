name: Feature request
description: Propose a new capability or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired Outcome
      description: What business or delivery outcome do we need?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Practical implementation approach
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other options and why they are weaker

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Commercial / Delivery Impact
      description: Revenue, margin, client value, schedule risk reduction
    validations:
      required: true
